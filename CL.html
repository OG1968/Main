<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>פריסת קרטון</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @page {
            size: A4 landscape;
            margin: 0.5cm;
        }

        body {
            background: linear-gradient(135deg, #e3f0ff 0%, #b8d4f0 50%, #91bce6 100%);
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
            gap: 8px;
            padding: 6px 16px 16px 16px;
            position: relative;
            overflow-x: hidden;
        }

        /* רקע דקורטיבי עם עיגולים */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(circle at 20% 80%, rgba(255, 255, 255, 0.2) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(255, 255, 255, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 40% 40%, rgba(255, 255, 255, 0.1) 0%, transparent 50%);
            animation: float 20s ease-in-out infinite;
            z-index: 0;
            pointer-events: none;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(30px, -20px) rotate(5deg); }
            66% { transform: translate(-20px, 30px) rotate(-5deg); }
        }

        /* ------ כותרת ראשית ------ */
        .main-header {
            text-align: center;
            position: relative;
            z-index: 1;
            margin-bottom: 0px;
            margin-top: 0px;
            padding-top: 0px;
        }

        .main-header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: #0f2a44;
            text-shadow: 0 2px 15px rgba(255,255,255,0.3);
            letter-spacing: 1px;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 4px 24px;
            border-radius: 60px;
            display: inline-block;
            border: 1px solid rgba(255,255,255,0.6);
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
        }

        .main-header h1 .highlight {
            color: #1a6b4a;
        }

        .main-header h1 .sub {
            font-size: 0.8rem;
            font-weight: 400;
            color: #3a5a7a;
            display: block;
            margin-top: 0px;
            letter-spacing: 0.5px;
        }

        /* ------ שורת בקרה מעוצבת ------ */
        .controls {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 8px 18px;
            border-radius: 60px;
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.15), 0 2px 8px rgba(0,0,0,0.04);
            border: 1px solid rgba(255,255,255,0.8);
            position: relative;
            z-index: 1;
            transition: all 0.3s ease;
        }

        .controls:hover {
            box-shadow: 0 12px 40px rgba(31, 38, 135, 0.2);
            transform: translateY(-2px);
        }

        .controls label {
            font-weight: 600;
            font-size: 0.85rem;
            color: #1e2b3c;
            letter-spacing: 0.3px;
            display: flex;
            align-items: center;
            gap: 3px;
        }

        .controls label::before {
            content: "▍";
            color: #4a7bb5;
            font-weight: 300;
            font-size: 0.9rem;
        }

        .controls input {
            width: 60px;
            padding: 6px 8px;
            font-size: 0.85rem;
            font-weight: 500;
            border: 2px solid #e2e8f0;
            border-radius: 40px;
            background: white;
            text-align: center;
            color: #0b1a2b;
            transition: all 0.2s ease;
            box-shadow: inset 0 1px 4px rgba(0,0,0,0.02);
        }

        .controls input:focus {
            border-color: #4a7bb5;
            box-shadow: 0 0 0 4px rgba(74, 123, 181, 0.15);
            outline: none;
            transform: scale(1.02);
        }

        .controls input:hover {
            border-color: #6b9bcb;
        }

        .controls .btn-update {
            padding: 6px 22px;
            font-size: 0.85rem;
            font-weight: 600;
            background: linear-gradient(135deg, #1f6e43, #2d8a56);
            color: white;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.25s ease;
            box-shadow: 0 4px 15px rgba(31, 110, 67, 0.3);
            letter-spacing: 0.4px;
            margin-left: 2px;
            position: relative;
            overflow: hidden;
        }

        .controls .btn-update::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s ease;
        }

        .controls .btn-update:hover::before {
            left: 100%;
        }

        .controls .btn-update:hover {
            background: linear-gradient(135deg, #135432, #1f6e43);
            transform: scale(1.03) translateY(-2px);
            box-shadow: 0 6px 20px rgba(31, 110, 67, 0.4);
        }

        .controls .btn-update:active {
            transform: scale(0.96);
        }

        /* ------ שורת פעולות (PDF + צ'קבוקס + הערה) ------ */
        .actions {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            padding: 8px 16px;
            border-radius: 60px;
            border: 1px solid rgba(255,255,255,0.7);
            box-shadow: 0 4px 15px rgba(0,0,0,0.06);
            position: relative;
            z-index: 1;
            transition: all 0.3s ease;
        }

        .actions:hover {
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 6px 20px rgba(0,0,0,0.08);
        }

        .actions .checkbox-wrapper {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            user-select: none;
            font-weight: 500;
            font-size: 0.85rem;
            color: #1e2b3c;
            transition: all 0.2s ease;
        }

        .actions .checkbox-wrapper:hover {
            color: #1a4972;
        }

        .actions .checkbox-wrapper input[type="checkbox"] {
            width: 16px;
            height: 16px;
            cursor: pointer;
            accent-color: #1a4972;
            border-radius: 4px;
            transition: all 0.2s ease;
        }

        .actions .checkbox-wrapper input[type="checkbox"]:hover {
            transform: scale(1.1);
        }

        .actions .checkbox-wrapper input[type="checkbox"]:checked {
            accent-color: #1f6e43;
        }

        .btn-pdf {
            padding: 8px 28px;
            font-size: 0.9rem;
            font-weight: 600;
            background: linear-gradient(135deg, #1a4972, #2a6b9e);
            color: white;
            border: none;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.25s ease;
            box-shadow: 0 8px 25px rgba(26, 73, 114, 0.35);
            letter-spacing: 0.5px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            position: relative;
            overflow: hidden;
        }

        .btn-pdf::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s ease;
        }

        .btn-pdf:hover::before {
            left: 100%;
        }

        .btn-pdf:hover {
            background: linear-gradient(135deg, #0d3454, #1a4972);
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 12px 30px rgba(26, 73, 114, 0.45);
        }

        .btn-pdf:active {
            transform: scale(0.96);
        }

        .btn-pdf::after {
            content: "📄";
            font-size: 1.1rem;
            transition: transform 0.3s ease;
        }

        .btn-pdf:hover::after {
            transform: rotate(-10deg) scale(1.1);
        }

        /* ------ שדה הערה (מוזג לתוך שורת הפעולות) ------ */
        .note-wrapper {
            display: flex;
            align-items: center;
            gap: 6px;
            border-right: 2px solid rgba(0,0,0,0.08);
            padding-right: 10px;
        }

        .note-wrapper label {
            font-weight: 600;
            font-size: 0.85rem;
            color: #1e2b3c;
            display: flex;
            align-items: center;
            gap: 3px;
            white-space: nowrap;
        }

        .note-wrapper label::before {
            content: "✏️";
            font-size: 0.9rem;
        }

        .note-wrapper input {
            padding: 5px 12px;
            font-size: 0.85rem;
            border: 2px solid #e2e8f0;
            border-radius: 30px;
            background: white;
            color: #0b1a2b;
            transition: all 0.2s ease;
            min-width: 160px;
            box-shadow: inset 0 1px 4px rgba(0,0,0,0.02);
            text-align: right;
            direction: rtl;
        }

        .note-wrapper input:focus {
            border-color: #4a7bb5;
            box-shadow: 0 0 0 4px rgba(74, 123, 181, 0.15);
            outline: none;
        }

        .note-wrapper input:hover {
            border-color: #6b9bcb;
        }

        .note-wrapper input::placeholder {
            color: #9aaec2;
            font-weight: 400;
        }

        /* ------ שורת מידע מעודנת ------ */
        .info-bar {
            font-size: 0.85rem;
            color: #1f3347;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            padding: 6px 18px;
            border-radius: 48px;
            border: 1px solid rgba(255,255,255,0.7);
            box-shadow: 0 4px 15px rgba(0,0,0,0.06);
            font-weight: 500;
            letter-spacing: 0.2px;
            position: relative;
            z-index: 1;
            transition: all 0.3s ease;
        }

        .info-bar:hover {
            background: rgba(255, 255, 255, 0.9);
            transform: scale(1.02);
            box-shadow: 0 6px 20px rgba(0,0,0,0.08);
        }

        /* ------ מיכל הפריסה (רשת) ------ */
        .net {
            position: relative;
            background: white;
            border: none;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 20, 40, 0.15), 0 4px 16px rgba(0,0,0,0.04);
            transition: all 0.3s ease;
            padding: 8px;
            background: linear-gradient(145deg, #ffffff, #f8faff);
            position: relative;
            z-index: 1;
        }

        .net:hover {
            box-shadow: 0 25px 70px rgba(0, 20, 40, 0.2);
            transform: scale(1.005);
        }

        .panel {
            position: absolute;
            border: 2px solid #1f2f3f;
            border-radius: 8px;
            background: white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 13px;
            font-weight: 600;
            text-align: center;
            flex-direction: column;
            transition: all 0.2s ease;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            color: #111e2c;
            padding: 2px;
            cursor: default;
        }

        .panel:hover {
            transform: scale(1.02);
            z-index: 10;
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
        }

        /* צבעי לוחות – עדינים ומודרניים עם מעברי צבע */
        .panel[style*="background: #ffe6f0"] { 
            background: linear-gradient(135deg, #fcecf2, #f8dce6); 
            border-color: #c97b9c;
        }
        .panel[style*="background: #f9f9f9"] { 
            background: linear-gradient(135deg, #f2f6fe, #e8edf8); 
            border-color: #7f96b5;
        }
        .panel[style*="background: #e6f2ff"] { 
            background: linear-gradient(135deg, #e2edfc, #d4e3f8); 
            border-color: #5d7fa0;
        }

        .dim-label {
            font-size: 14px;
            font-weight: 700;
            line-height: 1.3;
            color: #0f1e2f;
            text-shadow: 0 1px 2px rgba(255,255,255,0.5);
        }

        .dim-sub {
            font-size: 11px;
            font-weight: 500;
            color: #2c4058;
            background: rgba(255,255,255,0.4);
            padding: 2px 8px;
            border-radius: 20px;
            margin-top: 2px;
            backdrop-filter: blur(4px);
        }

        /* ------ התאמות להדפסה ------ */
        @media print {
            body { background: white; padding: 0; gap: 4px; }
            body::before { display: none; }
            .main-header { display: none; }
            .controls { display: none; }
            .actions { display: none; }
            .info-bar { display: none; }
            .net { border: none; border-radius: 0; box-shadow: none; padding: 0; background: white; }
            .panel { border: 2px solid black; border-radius: 0; }
            .panel:hover { transform: none; box-shadow: none; }
        }

        /* ------ רספונסיביות קלה ------ */
        @media (max-width: 700px) {
            body { padding: 4px 10px 10px 10px; gap: 6px; }
            .main-header h1 {
                font-size: 1.2rem;
                padding: 4px 16px;
            }
            .main-header h1 .sub {
                font-size: 0.7rem;
            }
            .controls {
                padding: 8px 12px;
                border-radius: 32px;
                gap: 6px;
            }
            .controls input { width: 50px; padding: 4px 6px; font-size: 0.8rem; }
            .controls .btn-update { padding: 4px 14px; font-size: 0.8rem; }
            .actions { 
                padding: 8px 12px; 
                gap: 8px;
                flex-direction: column;
                align-items: stretch;
            }
            .note-wrapper {
                border-right: none;
                padding-right: 0;
                border-top: 2px solid rgba(0,0,0,0.08);
                padding-top: 8px;
                justify-content: center;
            }
            .note-wrapper input { min-width: 120px; font-size: 0.8rem; padding: 4px 10px; }
            .btn-pdf { padding: 6px 16px; font-size: 0.85rem; justify-content: center; }
            .info-bar { font-size: 0.75rem; padding: 4px 12px; }
            .actions .checkbox-wrapper { font-size: 0.8rem; justify-content: center; }
            .actions .checkbox-wrapper input[type="checkbox"] { width: 15px; height: 15px; }
        }

        /* ------ תוספות קוסמטיות ------ */
        
        /* אינדיקטור טעינה ויזואלי */
        .loading-indicator {
            display: none;
            position: fixed;
            top: 20px;
            right: 20px;
            width: 40px;
            height: 40px;
            border: 3px solid #e2e8f0;
            border-top: 3px solid #4a7bb5;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            z-index: 1000;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* עיצוב מספרים בשדות הקלט */
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            opacity: 0.5;
        }

        input[type="number"]:hover::-webkit-inner-spin-button,
        input[type="number"]:hover::-webkit-outer-spin-button {
            opacity: 1;
        }

        /* תוספת - טוסט הודעה */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: rgba(26, 73, 114, 0.9);
            backdrop-filter: blur(10px);
            color: white;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 500;
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 999;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }
    </style>
</head>
<body>

    <!-- אינדיקטור טעינה -->
    <div class="loading-indicator" id="loadingIndicator"></div>

    <!-- טוסט הודעה -->
    <div class="toast" id="toast">✅ הפריסה עודכנה!</div>

    <!-- ===== כותרת ראשית ===== -->
    <div class="main-header">
        <h1>
            📦 <span class="highlight"></span> יוצר פריסת קרטונים</span>
        </h1>
    </div>

    <!-- ===== שורת בקרה ===== -->
    <div class="controls">
        <label>L (אורך)</label>
        <input type="number" id="inputL" value="62" step="0.1" min="1">

        <label>W (רוחב)</label>
        <input type="number" id="inputW" value="46" step="0.1" min="1">

        <label>H (גובה)</label>
        <input type="number" id="inputH" value="88.5" step="0.1" min="1">

        <button class="btn-update" onclick="updateNet()">🔄 עדכן פריסה</button>
    </div>

    <!-- ===== שורת פעולות (PDF + צ'קבוקס + הערה) ===== -->
    <div class="actions">
        <div class="checkbox-wrapper">
            <input type="checkbox" id="hideLabels">
            <label for="hideLabels">הסתר כותרות חלקים</label>
        </div>
        
        <button class="btn-pdf" onclick="downloadPDF()">הורד PDF</button>

        <div class="note-wrapper">
            <label for="noteInput">הערה</label>
            <input type="text" id="noteInput" placeholder="הוסף הערה לפריסה..." maxlength="100">
        </div>
    </div>

    <!-- שורת מידע -->
    <div class="info-bar" id="infoBar"></div>

    <!-- ===== מיכל הפריסה ===== -->
    <div id="netContainer"></div>

    <script>
        let L = 62;
        let W = 46;
        let H = 88.5;
        const scale = 3.78;

        const topColor = '#ffe6f0';
        const wallColor = '#f9f9f9';
        const bottomColor = '#e6f2ff';

        // פונקציה להצגת טוסט
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message || '✅ הפריסה עודכנה!';
            toast.classList.add('show');
            clearTimeout(toast._timeout);
            toast._timeout = setTimeout(() => {
                toast.classList.remove('show');
            }, 2500);
        }

        function getDimensions() {
            L = parseFloat(document.getElementById('inputL').value) || 62;
            W = parseFloat(document.getElementById('inputW').value) || 46;
            H = parseFloat(document.getElementById('inputH').value) || 88.5;
            return { L, W, H };
        }

        function getNote() {
            return document.getElementById('noteInput').value.trim();
        }

        function getHideLabels() {
            return document.getElementById('hideLabels').checked;
        }

        function buildNet(L, W, H) {
            // הצגת אינדיקטור טעינה
            const indicator = document.getElementById('loadingIndicator');
            indicator.style.display = 'block';

            setTimeout(() => {
                const totalWidth = W + L + W + L;
                const maxTopHeight = Math.max(L/2, W/2);
                const totalHeight = maxTopHeight + H + maxTopHeight;
                const totalW = totalWidth * scale;
                const totalH = totalHeight * scale;

                const container = document.getElementById('netContainer');
                container.style.width = totalW + 'px';
                container.style.height = totalH + 'px';
                container.className = 'net';
                container.innerHTML = '';

                // בדיקה אם להסתיר כותרות
                const hideLabels = getHideLabels();

                function createPanel(name, left, top, w, h, color, sub) {
                    const div = document.createElement('div');
                    div.className = 'panel';
                    div.style.left = (left * scale) + 'px';
                    div.style.top = (top * scale) + 'px';
                    div.style.width = (w * scale) + 'px';
                    div.style.height = (h * scale) + 'px';
                    div.style.background = color;
                    
                    if (hideLabels) {
                        // הצג רק מידות ללא כותרת
                        div.innerHTML = `
                            <span class="dim-label" style="font-size: 16px;">${sub}</span>
                        `;
                    } else {
                        // הצג כותרת ומידות
                        div.innerHTML = `
                            <span class="dim-label">${name}<br><span class="dim-sub">${sub}</span></span>
                        `;
                    }
                    
                    // הוספת אפקט hover עם מידע נוסף
                    div.title = `${name}: ${sub} ס"מ`;
                    container.appendChild(div);
                }

                // מכסים עליונים - צמודים לחלק העליון של הדפנות
                const topData = [
                    { name: 'מכסה עליון', w: W, h: L/2, sub: W + '×' + (L/2).toFixed(1) },
                    { name: 'מכסה עליון', w: L, h: W/2, sub: L + '×' + (W/2).toFixed(1) },
                    { name: 'מכסה עליון', w: W, h: L/2, sub: W + '×' + (L/2).toFixed(1) },
                    { name: 'מכסה עליון', w: L, h: W/2, sub: L + '×' + (W/2).toFixed(1) },
                ];

                let x = 0;
                topData.forEach(p => {
                    const topPos = maxTopHeight - p.h;
                    createPanel(p.name, x, topPos, p.w, p.h, topColor, p.sub);
                    x += p.w;
                });

                // דפנות
                const wallData = [
                    { name: 'דופן 1', w: W, h: H, sub: W + '×' + H },
                    { name: 'דופן 2', w: L, h: H, sub: L + '×' + H },
                    { name: 'דופן 3', w: W, h: H, sub: W + '×' + H },
                    { name: 'דופן 4', w: L, h: H, sub: L + '×' + H },
                ];

                x = 0;
                wallData.forEach(p => {
                    createPanel(p.name, x, maxTopHeight, p.w, p.h, wallColor, p.sub);
                    x += p.w;
                });

                // תחתיות
                const bottomData = [
                    { name: 'תחתית', w: W, h: L/2, sub: W + '×' + (L/2).toFixed(1) },
                    { name: 'תחתית', w: L, h: W/2, sub: L + '×' + (W/2).toFixed(1) },
                    { name: 'תחתית', w: W, h: L/2, sub: W + '×' + (L/2).toFixed(1) },
                    { name: 'תחתית', w: L, h: W/2, sub: L + '×' + (W/2).toFixed(1) },
                ];

                x = 0;
                bottomData.forEach(p => {
                    createPanel(p.name, x, maxTopHeight + H, p.w, p.h, bottomColor, p.sub);
                    x += p.w;
                });

                // עדכון שורת מידע
                document.getElementById('infoBar').innerHTML =
                    '📐 L=' + L + ' ס"מ &nbsp;|&nbsp; W=' + W + ' ס"מ &nbsp;|&nbsp; H=' + H + ' ס"מ &nbsp;|&nbsp; ' +
                    'פריסה: ' + totalWidth + '×' + totalHeight.toFixed(1) + ' ס"מ &nbsp;|&nbsp; ' +
                    '🔲 ' + (topData.length + wallData.length + bottomData.length) + ' חלקים';

                window._currentL = L;
                window._currentW = W;
                window._currentH = H;
                window._totalWidth = totalWidth;
                window._totalHeight = totalHeight;
                window._totalW = totalW;
                window._totalH = totalH;

                // הסתרת אינדיקטור טעינה
                indicator.style.display = 'none';
                
                // הצגת טוסט
                showToast('✅ פריסה עודכנה!');

            }, 300); // אנימציית טעינה קטנה
        }

        function updateNet() {
            const dims = getDimensions();
            buildNet(dims.L, dims.W, dims.H);
        }

        function downloadPDF() {
            const dims = getDimensions();
            const L = dims.L;
            const W = dims.W;
            const H = dims.H;
            const note = getNote();
            const hideLabels = getHideLabels();
            const totalWidth = W + L + W + L;
            const totalHeight = Math.max(L/2, W/2) + H + Math.max(L/2, W/2);
            const totalW = totalWidth * scale;
            const totalH = totalHeight * scale;

            const container = document.getElementById('netContainer');
            // נשמור את ה-HTML המעודכן עם המצב הנוכחי של הצ'קבוקס
            const originalHTML = container.innerHTML;

            showToast('📄 מוריד PDF...');

            const printWindow = window.open('', '_blank', 'width=1200,height=800');
            printWindow.document.write(`
                <!DOCTYPE html>
                <html>
                <head>
                    <meta charset="UTF-8">
                    <title>פריסת קרטון - ${L}×${W}×${H}</title>
                    <style>
                        * { margin: 0; padding: 0; box-sizing: border-box; }
                        @page { size: A4 landscape; margin: 0.5cm; }
                        body {
                            background: white;
                            display: flex;
                            flex-direction: column;
                            justify-content: center;
                            align-items: center;
                            min-height: 100vh;
                            font-family: 'Segoe UI', Arial, sans-serif;
                            padding: 10px;
                        }
                        .net {
                            position: relative;
                            width: ${totalW}px;
                            height: ${totalH}px;
                            border: none;
                            background: white;
                        }
                        .panel {
                            position: absolute;
                            border: 2px solid black;
                            background: white;
                            display: flex;
                            justify-content: center;
                            align-items: center;
                            font-size: 13px;
                            font-weight: bold;
                            text-align: center;
                            flex-direction: column;
                        }
                        .dim-label {
                            font-size: 14px;
                            font-weight: bold;
                        }
                        .dim-sub {
                            font-size: 11px;
                            font-weight: normal;
                            color: #333;
                        }
                        .footer {
                            position: fixed;
                            bottom: 15px;
                            left: 0;
                            right: 0;
                            text-align: center;
                            font-size: 13px;
                            color: #555;
                            font-family: 'Segoe UI', Arial, sans-serif;
                            padding: 8px 20px;
                            background: rgba(255,255,255,0.9);
                            border-top: 1px solid #ddd;
                            direction: rtl;
                            display: flex;
                            flex-direction: column;
                            align-items: flex-end;
                        }
                        .footer .dimensions {
                            direction: rtl;
                            text-align: right;
                            padding-left: 20px;
                            width: 100%;
                        }
                        .footer .note {
                            color: #1a4972;
                            font-weight: 600;
                            margin-top: 3px;
                            font-size: 12px;
                            text-align: right;
                            direction: rtl;
                            width: 100%;
                        }
                        @media print {
                            .net { border: none; }
                            .panel { border: 2px solid black; }
                            .footer { 
                                border-top: 1px solid #999;
                                background: white;
                            }
                            .footer .note { color: #1a4972; }
                        }
                    </style>
                </head>
                <body>
                    <div class="net">
                        ${originalHTML}
                    </div>
                    <div class="footer">
                        <div class="dimensions">מידות: L=${L} ס"מ | W=${W} ס"מ | H=${H} ס"מ &nbsp;·&nbsp; ${totalWidth}×${totalHeight.toFixed(1)} ס"מ</div>
                        ${note ? `<div class="note">📝 ${note}</div>` : ''}
                    </div>
                    <script>
                        window.onload = function() {
                            window.print();
                        };
                    <\/script>
                </body>
                </html>
            `);
            printWindow.document.close();
            
            setTimeout(() => {
                showToast('✅ PDF נוצר בהצלחה!');
            }, 1000);
        }

        // האזנה לשינוי בצ'קבוקס - עדכון הפריסה אוטומטי
        document.getElementById('hideLabels').addEventListener('change', function() {
            updateNet();
        });

        document.getElementById('inputL').value = L;
        document.getElementById('inputW').value = W;
        document.getElementById('inputH').value = H;

        buildNet(L, W, H);

        document.querySelectorAll('.controls input').forEach(input => {
            input.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    updateNet();
                }
            });
        });

        // עדכון פריסה גם בלחיצת Enter בשדה ההערה
        document.getElementById('noteInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                updateNet();
            }
        });

        console.log('✅ מוכן! המכסים צמודים לחלק העליון של הדפנות.');
    </script>
</body>
</html>
