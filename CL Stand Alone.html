<!DOCTYPE html>
<html lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>פריסת קרטון – יוצר קופסאות</title>
    <link rel="icon" href="data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect x='10' y='20' width='80' height='60' fill='%23b87333' stroke='%235a3e1b' stroke-width='4'/%3E%3Crect x='10' y='20' width='80' height='12' fill='%23d4a373' stroke='%235a3e1b' stroke-width='3'/%3E%3Crect x='10' y='68' width='80' height='12' fill='%23d4a373' stroke='%235a3e1b' stroke-width='3'/%3E%3C/svg%3E">
    <style>
        * {
          margin: 0;
          padding: 0;
          box-sizing: border-box;
        }
        
        body {
          background: #b3d4f0;
          display: flex;
          flex-direction: column;
          justify-content: flex-start;
          align-items: center;
          min-height: 100vh;
          font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
          gap: 8px;
          padding: 6px 16px 16px 16px;
          position: relative;
          overflow-x: hidden;
        }
        
        .main-header {
          text-align: center;
          position: relative;
          z-index: 1;
          margin-bottom: 0px;
          margin-top: 0px;
          padding-top: 0px;
        }
        
        .main-header h1 {
          font-size: 2rem;
          font-weight: 700;
          color: #0c3861;
          text-shadow: 0 2px 15px rgba(255,255,255,0.3);
          letter-spacing: 1px;
          background: transparent;
          padding: 4px 24px;
          border-radius: 0;
          display: inline-block;
          border: none;
          box-shadow: none;
        }
        
        .main-header h1 .highlight {
          color: #000E5E;
        }
        
        .controls {
          display: flex;
          align-items: center;
          gap: 8px;
          flex-wrap: wrap;
          justify-content: center;
          background: transparent;
          padding: 8px 18px;
          border-radius: 0;
          box-shadow: none;
          border: none;
          position: relative;
          z-index: 1;
          transition: all 0.3s ease;
        }
        
        .controls label {
          font-weight: 600;
          font-size: 0.85rem;
          color: #1e2b3c;
          letter-spacing: 0.3px;
          display: flex;
          align-items: center;
          gap: 3px;
        }
        
        .controls label::before {
          content: "▍";
          color: #4a7bb5;
          font-weight: 300;
          font-size: 0.9rem;
        }
        
        .controls input {
          width: 70px;
          padding: 6px 8px;
          font-size: 0.85rem;
          font-weight: 500;
          border: 2px solid rgba(255,255,255,0.8);
          border-radius: 40px;
          background: rgba(255, 255, 255, 0.7);
          text-align: center;
          color: #0b1a2b;
          transition: all 0.2s ease;
          box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        
        .controls input:focus {
          border-color: #4a7bb5;
          box-shadow: 0 0 0 4px rgba(74, 123, 181, 0.15);
          outline: none;
          transform: scale(1.02);
        }
        
        .controls input:hover {
          border-color: #6b9bcb;
        }
        
        .controls .btn-update {
          padding: 6px 22px;
          font-size: 0.85rem;
          font-weight: 600;
          background: linear-gradient(135deg, #1f6e43, #2d8a56);
          color: white;
          border: none;
          border-radius: 40px;
          cursor: pointer;
          transition: all 0.25s ease;
          box-shadow: 0 4px 15px rgba(31, 110, 67, 0.3);
          letter-spacing: 0.4px;
          margin-left: 2px;
          position: relative;
          overflow: hidden;
        }
        
        .controls .btn-update::before {
          content: '';
          position: absolute;
          top: 0;
          left: -100%;
          width: 100%;
          height: 100%;
          background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
          transition: left 0.5s ease;
        }
        
        .controls .btn-update:hover::before {
          left: 100%;
        }
        
        .controls .btn-update:hover {
          background: linear-gradient(135deg, #135432, #1f6e43);
          transform: scale(1.03) translateY(-2px);
          box-shadow: 0 6px 20px rgba(31, 110, 67, 0.4);
        }
        
        .controls .btn-update:active {
          transform: scale(0.96);
        }
        
        .actions {
          display: flex;
          align-items: center;
          gap: 10px;
          flex-wrap: wrap;
          justify-content: center;
          background: transparent;
          padding: 8px 16px;
          border-radius: 0;
          border: none;
          box-shadow: none;
          position: relative;
          z-index: 1;
          transition: all 0.3s ease;
        }
        
        .actions .checkbox-wrapper {
          display: flex;
          align-items: center;
          gap: 6px;
          cursor: pointer;
          user-select: none;
          font-weight: 500;
          font-size: 0.85rem;
          color: #1e2b3c;
          transition: all 0.2s ease;
        }
        
        .actions .checkbox-wrapper:hover {
          color: #1a4972;
        }
        
        .actions .checkbox-wrapper input[type="checkbox"] {
          width: 16px;
          height: 16px;
          cursor: pointer;
          accent-color: #1a4972;
          border-radius: 4px;
          transition: all 0.2s ease;
        }
        
        .actions .checkbox-wrapper input[type="checkbox"]:hover {
          transform: scale(1.1);
        }
        
        .actions .checkbox-wrapper input[type="checkbox"]:checked {
          accent-color: #1f6e43;
        }
        
        .btn-pdf {
          padding: 8px 28px;
          font-size: 0.9rem;
          font-weight: 600;
          background: linear-gradient(135deg, #1a4972, #2a6b9e);
          color: white;
          border: none;
          border-radius: 60px;
          cursor: pointer;
          transition: all 0.25s ease;
          box-shadow: 0 8px 25px rgba(26, 73, 114, 0.35);
          letter-spacing: 0.5px;
          display: inline-flex;
          align-items: center;
          gap: 6px;
          position: relative;
          overflow: hidden;
        }
        
        .btn-pdf::before {
          content: '';
          position: absolute;
          top: 0;
          left: -100%;
          width: 100%;
          height: 100%;
          background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
          transition: left 0.5s ease;
        }
        
        .btn-pdf:hover::before {
          left: 100%;
        }
        
        .btn-pdf:hover {
          background: linear-gradient(135deg, #0d3454, #1a4972);
          transform: translateY(-3px) scale(1.02);
          box-shadow: 0 12px 30px rgba(26, 73, 114, 0.45);
        }
        
        .btn-pdf:active {
          transform: scale(0.96);
        }
        
        .btn-pdf::after {
          content: "📄";
          font-size: 1.1rem;
          transition: transform 0.3s ease;
        }
        
        .btn-pdf:hover::after {
          transform: rotate(-10deg) scale(1.1);
        }
        
        .note-wrapper {
          display: flex;
          align-items: center;
          gap: 6px;
          border-right: 2px solid rgba(0,0,0,0.08);
          padding-right: 10px;
        }
        
        .note-wrapper label {
          font-weight: 600;
          font-size: 0.85rem;
          color: #1e2b3c;
          display: flex;
          align-items: center;
          gap: 3px;
          white-space: nowrap;
        }
        
        .note-wrapper label::before {
          content: "✏️";
          font-size: 0.9rem;
        }
        
        .note-wrapper input {
          padding: 5px 12px;
          font-size: 0.85rem;
          border: 2px solid rgba(255,255,255,0.8);
          border-radius: 30px;
          background: rgba(255, 255, 255, 0.7);
          color: #0b1a2b;
          transition: all 0.2s ease;
          min-width: 160px;
          box-shadow: 0 2px 8px rgba(0,0,0,0.05);
          text-align: right;
          direction: rtl;
        }
        
        .note-wrapper input:focus {
          border-color: #4a7bb5;
          box-shadow: 0 0 0 4px rgba(74, 123, 181, 0.15);
          outline: none;
        }
        
        .note-wrapper input:hover {
          border-color: #6b9bcb;
        }
        
        .note-wrapper input::placeholder {
          color: #9aaec2;
          font-weight: 400;
        }
        
        .info-bar {
          font-size: 0.85rem;
          color: #1f3347;
          background: transparent;
          padding: 6px 18px;
          border-radius: 0;
          border: none;
          box-shadow: none;
          font-weight: 500;
          position: relative;
          z-index: 1;
          transition: all 0.3s ease;
          text-align: center;
        }
        
        /* ===== מיכל הפריסה ===== */
        .net-wrapper {
          position: relative;
          width: 100%;
          overflow: auto;
          display: flex;
          justify-content: center;
          align-items: flex-start;
          padding: 10px 0;
          min-height: 300px;
        }
        
        .net {
          position: relative;
          background: transparent;
          border: none;
          border-radius: 0;
          box-shadow: none;
          padding: 0;
          transform-origin: top center;
          flex-shrink: 0;
        }
        
        .panel {
          position: absolute;
          border: 2px solid #1f2f3f;
          border-radius: 8px;
          background: white;
          display: flex;
          justify-content: center;
          align-items: center;
          font-size: 13px;
          font-weight: 600;
          text-align: center;
          flex-direction: column;
          transition: all 0.2s ease;
          box-shadow: 0 2px 8px rgba(0,0,0,0.04);
          color: #111e2c;
          padding: 2px;
          cursor: default;
        }
        
        .panel:hover {
          transform: scale(1.02);
          z-index: 10;
          box-shadow: 0 4px 16px rgba(0,0,0,0.1);
        }
        
        .dim-label {
          font-size: 14px;
          font-weight: 700;
          line-height: 1.3;
          color: #0f1e2f;
          text-shadow: 0 1px 2px rgba(255,255,255,0.5);
        }
        
        .dim-sub {
          font-size: 11px;
          font-weight: 500;
          color: #2c4058;
          background: rgba(255,255,255,0.4);
          padding: 2px 8px;
          border-radius: 20px;
          margin-top: 2px;
          backdrop-filter: blur(4px);
        }
        
        /* ===== תפריט המרה לנייד ===== */
        .mobile-menu-toggle {
          display: none;
          position: fixed;
          bottom: 20px;
          right: 20px;
          z-index: 1000;
          background: #1a4972;
          color: white;
          border: none;
          border-radius: 60px;
          padding: 14px 20px;
          font-size: 1.2rem;
          font-weight: 600;
          box-shadow: 0 8px 30px rgba(26, 73, 114, 0.5);
          cursor: pointer;
          transition: all 0.3s ease;
          gap: 8px;
          align-items: center;
          border: 2px solid rgba(255,255,255,0.3);
        }
        
        .mobile-menu-toggle:hover {
          transform: scale(1.05);
          background: #0d3454;
          box-shadow: 0 12px 40px rgba(26, 73, 114, 0.6);
        }
        
        .mobile-menu-toggle:active {
          transform: scale(0.95);
        }
        
        .mobile-menu-toggle .badge {
          background: #ff6b6b;
          color: white;
          border-radius: 50%;
          width: 24px;
          height: 24px;
          display: flex;
          align-items: center;
          justify-content: center;
          font-size: 0.7rem;
          font-weight: 700;
        }
        
        .mobile-menu-panel {
          display: none;
          position: fixed;
          bottom: 80px;
          right: 20px;
          left: 20px;
          z-index: 999;
          background: rgba(255,255,255,0.95);
          backdrop-filter: blur(20px);
          -webkit-backdrop-filter: blur(20px);
          border-radius: 24px;
          padding: 20px;
          box-shadow: 0 20px 60px rgba(0,0,0,0.25);
          border: 1px solid rgba(255,255,255,0.2);
          animation: slideUp 0.3s ease;
          max-height: 70vh;
          overflow-y: auto;
        }
        
        .mobile-menu-panel.open {
          display: block;
        }
        
        @keyframes slideUp {
          from { opacity: 0; transform: translateY(30px) scale(0.95); }
          to { opacity: 1; transform: translateY(0) scale(1); }
        }
        
        .mobile-menu-panel .panel-header {
          display: flex;
          justify-content: space-between;
          align-items: center;
          margin-bottom: 16px;
          padding-bottom: 12px;
          border-bottom: 2px solid rgba(0,0,0,0.06);
        }
        
        .mobile-menu-panel .panel-header h3 {
          font-size: 1.1rem;
          color: #0c3861;
          display: flex;
          align-items: center;
          gap: 8px;
        }
        
        .mobile-menu-panel .panel-close {
          background: none;
          border: none;
          font-size: 1.5rem;
          cursor: pointer;
          color: #666;
          padding: 0 8px;
          transition: transform 0.2s;
        }
        
        .mobile-menu-panel .panel-close:hover {
          transform: rotate(90deg);
        }
        
        .mobile-menu-panel .control-group {
          display: flex;
          flex-direction: column;
          gap: 12px;
        }
        
        .mobile-menu-panel .control-row {
          display: flex;
          align-items: center;
          gap: 10px;
          flex-wrap: wrap;
        }
        
        .mobile-menu-panel .control-row label {
          font-weight: 600;
          font-size: 0.9rem;
          color: #1e2b3c;
          min-width: 30px;
        }
        
        .mobile-menu-panel .control-row input[type="number"] {
          flex: 1;
          min-width: 60px;
          padding: 8px 12px;
          font-size: 0.9rem;
          border: 2px solid rgba(0,0,0,0.1);
          border-radius: 12px;
          background: rgba(255,255,255,0.8);
          text-align: center;
          transition: border-color 0.2s;
        }
        
        .mobile-menu-panel .control-row input[type="number"]:focus {
          border-color: #4a7bb5;
          outline: none;
        }
        
        .mobile-menu-panel .action-buttons {
          display: flex;
          flex-direction: column;
          gap: 8px;
          margin-top: 8px;
        }
        
        .mobile-menu-panel .action-buttons button {
          padding: 12px;
          border: none;
          border-radius: 14px;
          font-size: 0.95rem;
          font-weight: 600;
          cursor: pointer;
          transition: all 0.2s ease;
          display: flex;
          align-items: center;
          justify-content: center;
          gap: 8px;
        }
        
        .mobile-menu-panel .action-buttons .btn-update-mobile {
          background: linear-gradient(135deg, #1f6e43, #2d8a56);
          color: white;
        }
        
        .mobile-menu-panel .action-buttons .btn-update-mobile:active {
          transform: scale(0.97);
        }
        
        .mobile-menu-panel .action-buttons .btn-pdf-mobile {
          background: linear-gradient(135deg, #1a4972, #2a6b9e);
          color: white;
        }
        
        .mobile-menu-panel .action-buttons .btn-pdf-mobile:active {
          transform: scale(0.97);
        }
        
        .mobile-menu-panel .toggle-row {
          display: flex;
          align-items: center;
          justify-content: space-between;
          padding: 4px 0;
        }
        
        .mobile-menu-panel .toggle-row label {
          font-weight: 500;
          color: #1e2b3c;
        }
        
        .mobile-menu-panel .toggle-row input[type="checkbox"] {
          width: 20px;
          height: 20px;
          accent-color: #1a4972;
          cursor: pointer;
        }
        
        .mobile-menu-panel .note-row {
          margin-top: 8px;
        }
        
        .mobile-menu-panel .note-row input {
          width: 100%;
          padding: 10px 14px;
          border: 2px solid rgba(0,0,0,0.1);
          border-radius: 12px;
          font-size: 0.9rem;
          background: rgba(255,255,255,0.8);
          text-align: right;
          direction: rtl;
        }
        
        .mobile-menu-panel .note-row input:focus {
          border-color: #4a7bb5;
          outline: none;
        }
        
        /* Overlay */
        .mobile-overlay {
          display: none;
          position: fixed;
          top: 0;
          left: 0;
          right: 0;
          bottom: 0;
          background: rgba(0,0,0,0.3);
          z-index: 998;
          backdrop-filter: blur(4px);
          animation: fadeIn 0.3s ease;
        }
        
        .mobile-overlay.open {
          display: block;
        }
        
        @keyframes fadeIn {
          from { opacity: 0; }
          to { opacity: 1; }
        }
        
        /* ===== סגנונות להדפסת PDF ===== */
        @media print {
          body { 
            background: white; 
            padding: 0; 
            margin: 0;
            gap: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
          }
          .main-header { display: none; }
          .controls { display: none; }
          .actions { display: none; }
          .info-bar { display: none; }
          .mobile-menu-toggle { display: none !important; }
          .mobile-menu-panel { display: none !important; }
          .mobile-overlay { display: none !important; }
          
          .net-wrapper { 
            overflow: visible; 
            padding: 0; 
            margin: 0;
            min-height: auto;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100vh;
          }
          
          .net { 
            transform: scale(0.82) !important;
            transform-origin: center center !important;
            margin: 0 auto;
          }
          
          .panel { 
            border: 1.5px solid black; 
            border-radius: 3px;
          }
          .panel:hover { transform: none; box-shadow: none; }
        }
        
        /* ===== תצוגה לנייד ===== */
        @media (max-width: 768px) {
          body { padding: 4px 10px 80px 10px; gap: 6px; }
          .main-header h1 {
            font-size: 1.2rem;
            padding: 4px 16px;
          }
          .controls { display: none; }
          .actions { display: none; }
          
          .info-bar {
            font-size: 0.7rem;
            padding: 4px 8px;
          }
          
          .mobile-menu-toggle {
            display: flex;
          }
          
          .net-wrapper {
            overflow-x: auto;
            overflow-y: visible;
            padding: 5px 0;
            min-height: 250px;
            justify-content: center;
            align-items: center;
          }
          
          .net {
            transform-origin: top center;
          }
          
          .panel {
            border-radius: 5px;
            border-width: 1.5px;
          }
          
          .dim-label {
            font-size: 10px;
          }
          .dim-sub {
            font-size: 8px;
            padding: 1px 5px;
          }
        }
        
        @media (max-width: 480px) {
          .mobile-menu-panel {
            bottom: 70px;
            right: 10px;
            left: 10px;
            padding: 16px;
            border-radius: 20px;
            max-height: 70vh;
          }
          
          .mobile-menu-panel .control-row input[type="number"] {
            min-width: 50px;
            padding: 6px 8px;
            font-size: 0.85rem;
          }
          
          .mobile-menu-toggle {
            padding: 12px 16px;
            font-size: 1rem;
            bottom: 15px;
            right: 15px;
          }
          
          .net-wrapper {
            min-height: 200px;
          }
        }
        
        .loading-indicator {
          display: none;
          position: fixed;
          top: 20px;
          right: 20px;
          width: 40px;
          height: 40px;
          border: 3px solid #e2e8f0;
          border-top: 3px solid #4a7bb5;
          border-radius: 50%;
          animation: spin 1s linear infinite;
          z-index: 1000;
        }
        
        @keyframes spin {
          0% { transform: rotate(0deg); }
          100% { transform: rotate(360deg); }
        }
        
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
          opacity: 0.5;
        }
        
        input[type="number"]:hover::-webkit-inner-spin-button,
        input[type="number"]:hover::-webkit-outer-spin-button {
          opacity: 1;
        }
        
        .toast {
          position: fixed;
          bottom: 30px;
          right: 30px;
          background: rgba(26, 73, 114, 0.9);
          backdrop-filter: blur(10px);
          color: white;
          padding: 12px 24px;
          border-radius: 12px;
          font-size: 0.9rem;
          font-weight: 500;
          box-shadow: 0 8px 25px rgba(0,0,0,0.2);
          transform: translateY(100px);
          opacity: 0;
          transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
          z-index: 999;
          border: 1px solid rgba(255,255,255,0.1);
        }
        
        .toast.show {
          transform: translateY(0);
          opacity: 1;
        }

        @media (max-width: 768px) {
          .toast {
            bottom: 80px;
            right: 20px;
            left: 20px;
            text-align: center;
            padding: 10px 16px;
            font-size: 0.8rem;
          }
        }
    </style>
</head>
<body>

    <div class="loading-indicator" id="loadingIndicator"></div>
    <div class="toast" id="toast">✅ הפריסה עודכנה!</div>

    <!-- Overlay -->
    <div class="mobile-overlay" id="mobileOverlay"></div>

    <!-- כפתור תפריט נייד -->
    <button class="mobile-menu-toggle" id="mobileMenuToggle" aria-label="פתח תפריט שליטה">
        📐 תפריט
        <span class="badge" id="mobileBadge">⚡</span>
    </button>

    <!-- תפריט נייד -->
    <div class="mobile-menu-panel" id="mobileMenuPanel">
        <div class="panel-header">
            <h3>📦 שליטה בפריסה</h3>
            <button class="panel-close" id="mobileMenuClose">✕</button>
        </div>
        
        <div class="control-group">
            <div class="control-row">
                <label>L</label>
                <input type="number" id="mobileInputL" value="62" step="0.1" min="1">
                <label>W</label>
                <input type="number" id="mobileInputW" value="46" step="0.1" min="1">
                <label>H</label>
                <input type="number" id="mobileInputH" value="88.5" step="0.1" min="1">
            </div>
            
            <div class="action-buttons">
                <button class="btn-update-mobile" id="mobileUpdateBtn">🔄 עדכן פריסה</button>
                <button class="btn-pdf-mobile" id="mobilePdfBtn">📄 הורד PDF</button>
            </div>
            
            <div class="toggle-row">
                <label for="mobileHideLabels">הסתר כותרות חלקים</label>
                <input type="checkbox" id="mobileHideLabels">
            </div>
            
            <div class="note-row">
                <input type="text" id="mobileNoteInput" placeholder="✏️ הוסף הערה..." maxlength="100">
            </div>
        </div>
    </div>

    <div class="main-header">
        <h1>📦 <span class="highlight">יוצר פריסת קרטונים</span></h1>
    </div>

    <div class="controls">
        <label>L (אורך)</label>
        <input type="number" id="inputL" value="62" step="0.1" min="1">
        <label>W (רוחב)</label>
        <input type="number" id="inputW" value="46" step="0.1" min="1">
        <label>H (גובה)</label>
        <input type="number" id="inputH" value="88.5" step="0.1" min="1">
        <button class="btn-update" onclick="updateNet()">🔄 עדכן פריסה</button>
    </div>

    <div class="actions">
        <div class="checkbox-wrapper">
            <input type="checkbox" id="hideLabels">
            <label for="hideLabels">הסתר כותרות חלקים</label>
        </div>
        <button class="btn-pdf" onclick="downloadPDF()">הורד PDF</button>
        <div class="note-wrapper">
            <label for="noteInput">הערה</label>
            <input type="text" id="noteInput" placeholder="הוסף הערה לפריסה..." maxlength="100">
        </div>
    </div>

    <div class="info-bar" id="infoBar"></div>
    
    <div class="net-wrapper" id="netWrapper">
        <div id="netContainer"></div>
    </div>

    <script>
        (function() {
            let L = 62;
            let W = 46;
            let H = 88.5;
            const BASE_SCALE = 3.78;

            const topColor = '#ffe6f0';
            const wallColor = '#f9f9f9';
            const bottomColor = '#e6f2ff';

            let currentScale = 1;
            let isMobile = window.innerWidth <= 768;

            function showToast(message) {
                const toast = document.getElementById('toast');
                toast.textContent = message || '✅ הפריסה עודכנה!';
                toast.classList.add('show');
                clearTimeout(toast._timeout);
                toast._timeout = setTimeout(() => {
                    toast.classList.remove('show');
                }, 2500);
            }

            function getDimensions() {
                L = parseFloat(document.getElementById('inputL').value) || 62;
                W = parseFloat(document.getElementById('inputW').value) || 46;
                H = parseFloat(document.getElementById('inputH').value) || 88.5;
                return { L, W, H };
            }

            function getMobileDimensions() {
                const l = parseFloat(document.getElementById('mobileInputL').value) || 62;
                const w = parseFloat(document.getElementById('mobileInputW').value) || 46;
                const h = parseFloat(document.getElementById('mobileInputH').value) || 88.5;
                return { L: l, W: w, H: h };
            }

            function getNote() {
                return document.getElementById('noteInput').value.trim();
            }

            function getMobileNote() {
                return document.getElementById('mobileNoteInput').value.trim();
            }

            function getHideLabels() {
                return document.getElementById('hideLabels').checked;
            }

            function getMobileHideLabels() {
                return document.getElementById('mobileHideLabels').checked;
            }

            function calculateAutoScale() {
                isMobile = window.innerWidth <= 768;
                if (!isMobile) {
                    currentScale = 1;
                    return;
                }

                const totalWidth = W + L + W + L;
                const maxWidth = window.innerWidth - 40;
                const maxHeight = window.innerHeight - 300;
                const totalHeight = Math.max(L/2, W/2) + H + Math.max(L/2, W/2);
                
                const scaleByWidth = maxWidth / (totalWidth * BASE_SCALE);
                const scaleByHeight = maxHeight / (totalHeight * BASE_SCALE);
                
                let autoScale = Math.min(scaleByWidth, scaleByHeight, 1);
                autoScale = Math.max(autoScale, 0.2);
                autoScale = Math.min(autoScale, 1.2);
                
                currentScale = autoScale;
            }

            // פונקציה לבניית הפריסה עם קנה מידה ספציפי
            function buildNetWithScale(L, W, H, scaleFactor) {
                const totalWidth = W + L + W + L;
                const maxTopHeight = Math.max(L/2, W/2);
                const totalHeight = maxTopHeight + H + maxTopHeight;
                
                const effectiveScale = BASE_SCALE * scaleFactor;
                
                const totalW = totalWidth * effectiveScale;
                const totalH = totalHeight * effectiveScale;

                const container = document.getElementById('netContainer');
                container.style.width = totalW + 'px';
                container.style.height = totalH + 'px';
                container.className = 'net';
                container.innerHTML = '';

                const hideLabels = getHideLabels() || getMobileHideLabels();

                function createPanel(name, left, top, w, h, color, sub) {
                    const div = document.createElement('div');
                    div.className = 'panel';
                    div.style.left = (left * effectiveScale) + 'px';
                    div.style.top = (top * effectiveScale) + 'px';
                    div.style.width = (w * effectiveScale) + 'px';
                    div.style.height = (h * effectiveScale) + 'px';
                    div.style.background = color;
                    
                    const fontSize = Math.max(7, Math.min(16, 14 * scaleFactor));
                    const subFontSize = Math.max(6, Math.min(12, 11 * scaleFactor));
                    
                    if (hideLabels) {
                        div.innerHTML = `
                            <span class="dim-label" style="font-size: ${fontSize + 2}px;">${sub}</span>
                        `;
                    } else {
                        div.innerHTML = `
                            <span class="dim-label" style="font-size: ${fontSize}px;">${name}<br><span class="dim-sub" style="font-size: ${subFontSize}px;">${sub}</span></span>
                        `;
                    }
                    
                    div.title = `${name}: ${sub} ס"מ`;
                    container.appendChild(div);
                }

                const topData = [
                    { name: 'מכסה עליון', w: W, h: L/2, sub: W + '×' + (L/2).toFixed(1) },
                    { name: 'מכסה עליון', w: L, h: W/2, sub: L + '×' + (W/2).toFixed(1) },
                    { name: 'מכסה עליון', w: W, h: L/2, sub: W + '×' + (L/2).toFixed(1) },
                    { name: 'מכסה עליון', w: L, h: W/2, sub: L + '×' + (W/2).toFixed(1) },
                ];

                let x = 0;
                topData.forEach(p => {
                    const topPos = maxTopHeight - p.h;
                    createPanel(p.name, x, topPos, p.w, p.h, topColor, p.sub);
                    x += p.w;
                });

                const wallData = [
                    { name: 'דופן 1', w: W, h: H, sub: W + '×' + H },
                    { name: 'דופן 2', w: L, h: H, sub: L + '×' + H },
                    { name: 'דופן 3', w: W, h: H, sub: W + '×' + H },
                    { name: 'דופן 4', w: L, h: H, sub: L + '×' + H },
                ];

                x = 0;
                wallData.forEach(p => {
                    createPanel(p.name, x, maxTopHeight, p.w, p.h, wallColor, p.sub);
                    x += p.w;
                });

                const bottomData = [
                    { name: 'תחתית', w: W, h: L/2, sub: W + '×' + (L/2).toFixed(1) },
                    { name: 'תחתית', w: L, h: W/2, sub: L + '×' + (W/2).toFixed(1) },
                    { name: 'תחתית', w: W, h: L/2, sub: W + '×' + (L/2).toFixed(1) },
                    { name: 'תחתית', w: L, h: W/2, sub: L + '×' + (W/2).toFixed(1) },
                ];

                x = 0;
                bottomData.forEach(p => {
                    createPanel(p.name, x, maxTopHeight + H, p.w, p.h, bottomColor, p.sub);
                    x += p.w;
                });

                window._currentL = L;
                window._currentW = W;
                window._currentH = H;
                window._totalWidth = totalWidth;
                window._totalHeight = totalHeight;
                window._totalW = totalW;
                window._totalH = totalH;
            }

            function buildNet(L, W, H) {
                const indicator = document.getElementById('loadingIndicator');
                indicator.style.display = 'block';

                calculateAutoScale();

                setTimeout(() => {
                    buildNetWithScale(L, W, H, currentScale);

                    const totalWidth = W + L + W + L;
                    const totalHeight = Math.max(L/2, W/2) + H + Math.max(L/2, W/2);
                    
                    document.getElementById('infoBar').innerHTML =
                        '📐 L=' + L + ' ס"מ &nbsp;|&nbsp; W=' + W + ' ס"מ &nbsp;|&nbsp; H=' + H + ' ס"מ &nbsp;|&nbsp; ' +
                        'פריסה: ' + totalWidth + '×' + totalHeight.toFixed(1) + ' ס"מ &nbsp;|&nbsp; ' +
                        '🔲 12 חלקים' +
                        (isMobile ? ' &nbsp;|&nbsp; 📱 מותאם לנייד' : '');

                    indicator.style.display = 'none';
                    showToast('✅ פריסה עודכנה!');
                }, 300);
            }

            function syncFieldsToMobile() {
                const dims = getDimensions();
                document.getElementById('mobileInputL').value = dims.L;
                document.getElementById('mobileInputW').value = dims.W;
                document.getElementById('mobileInputH').value = dims.H;
                document.getElementById('mobileHideLabels').checked = getHideLabels();
                document.getElementById('mobileNoteInput').value = getNote();
            }

            function syncFieldsToDesktop() {
                const dims = getMobileDimensions();
                document.getElementById('inputL').value = dims.L;
                document.getElementById('inputW').value = dims.W;
                document.getElementById('inputH').value = dims.H;
                document.getElementById('hideLabels').checked = getMobileHideLabels();
                document.getElementById('noteInput').value = getMobileNote();
            }

            window.updateNet = function() {
                const dims = getDimensions();
                syncFieldsToMobile();
                buildNet(dims.L, dims.W, dims.H);
            };

            window.updateNetMobile = function() {
                const dims = getMobileDimensions();
                syncFieldsToDesktop();
                buildNet(dims.L, dims.W, dims.H);
                closeMobileMenu();
            };

            window.downloadPDF = function() {
                const dims = getDimensions();
                const L = dims.L;
                const W = dims.W;
                const H = dims.H;
                const note = getNote() || getMobileNote();
                const hideLabels = getHideLabels() || getMobileHideLabels();
                
                // בניית הפריסה עם קנה מידה 100% ל-PDF
                buildNetWithScale(L, W, H, 1);
                
                const container = document.getElementById('netContainer');
                const originalHTML = container.innerHTML;
                const totalWidthCm = W + L + W + L;
                const totalHeightCm = Math.max(L/2, W/2) + H + Math.max(L/2, W/2);

                // החזרת הקנה מידה המקורי
                setTimeout(() => {
                    buildNetWithScale(L, W, H, currentScale);
                }, 100);

                showToast('📄 מוריד PDF...');

                const printWindow = window.open('', '_blank', 'width=1200,height=800');
                printWindow.document.write(`
                    <!DOCTYPE html>
                    <html>
                    <head>
                      <meta charset="UTF-8">
                      <title>פריסת קרטון - ${L}×${W}×${H}</title>
                      <style>
                        * { margin: 0; padding: 0; box-sizing: border-box; }
                        html, body {
                          margin: 0;
                          padding: 0;
                          background: white;
                          width: 100%;
                          height: 100%;
                          display: flex;
                          justify-content: center;
                          align-items: center;
                          font-family: 'Segoe UI', Arial, sans-serif;
                        }
                        @page { 
                          size: A4 landscape; 
                          margin: 0.5cm;
                        }
                        .page-container {
                          display: flex;
                          flex-direction: column;
                          justify-content: center;
                          align-items: center;
                          width: 100%;
                          height: 100%;
                          padding: 5px;
                        }
                        .net-wrapper-print {
                          display: flex;
                          justify-content: center;
                          align-items: center;
                          width: 100%;
                          flex: 1;
                          overflow: hidden;
                          min-height: 0;
                        }
                        .net-print {
                          position: relative;
                          transform: scale(0.78);
                          transform-origin: center center;
                          margin: 0 auto;
                          flex-shrink: 0;
                        }
                        .panel-print {
                          position: absolute;
                          border: 1.5px solid black;
                          background: white;
                          display: flex;
                          justify-content: center;
                          align-items: center;
                          font-size: 13px;
                          font-weight: bold;
                          text-align: center;
                          flex-direction: column;
                          overflow: hidden;
                        }
                        .dim-label-print {
                          font-size: 14px;
                          font-weight: bold;
                          line-height: 1.3;
                        }
                        .dim-sub-print {
                          font-size: 10px;
                          font-weight: normal;
                          color: #333;
                          background: rgba(255,255,255,0.6);
                          padding: 1px 6px;
                          border-radius: 10px;
                          margin-top: 1px;
                        }
                        .footer {
                          width: 100%;
                          text-align: center;
                          font-size: 10px;
                          color: #555;
                          font-family: 'Segoe UI', Arial, sans-serif;
                          padding: 4px 10px;
                          background: white;
                          border-top: 1px solid #ddd;
                          direction: rtl;
                          display: flex;
                          flex-direction: column;
                          align-items: flex-end;
                          flex-shrink: 0;
                        }
                        .footer .dimensions {
                          direction: rtl;
                          text-align: right;
                          padding-left: 10px;
                          width: 100%;
                          font-size: 10px;
                        }
                        .footer .note {
                          color: #1a4972;
                          font-weight: 600;
                          margin-top: 1px;
                          font-size: 9px;
                          text-align: right;
                          direction: rtl;
                          width: 100%;
                        }
                        @media print {
                          html, body { margin: 0; padding: 0; height: 100%; }
                          .page-container { padding: 0; height: 100%; }
                          .net-print { transform: scale(0.78) !important; }
                          .panel-print { border: 1.5px solid black; }
                          .footer { border-top: 1px solid #999; }
                        }
                      </style>
                    </head>
                    <body>
                      <div class="page-container">
                        <div class="net-wrapper-print">
                          <div class="net-print" style="width:${window._totalW || 0}px;height:${window._totalH || 0}px;">
                            ${originalHTML.replace(/panel/g, 'panel-print').replace(/dim-label/g, 'dim-label-print').replace(/dim-sub/g, 'dim-sub-print')}
                          </div>
                        </div>
                        <div class="footer">
                          <div class="dimensions">מידות: L=${L} ס"מ | W=${W} ס"מ | H=${H} ס"מ &nbsp;·&nbsp; ${totalWidthCm}×${totalHeightCm.toFixed(1)} ס"מ</div>
                          ${note ? `<div class="note">📝 ${note}</div>` : ''}
                        </div>
                      </div>
                      <script>
                        window.onload = function() {
                          window.print();
                        };
                      <\/script>
                    </body>
                    </html>
                `);
                printWindow.document.close();
                
                setTimeout(() => {
                    showToast('✅ PDF נוצר בהצלחה!');
                }, 1000);
            };

            // ===== תפריט נייד =====
            function openMobileMenu() {
                document.getElementById('mobileMenuPanel').classList.add('open');
                document.getElementById('mobileOverlay').classList.add('open');
                syncFieldsToMobile();
            }

            function closeMobileMenu() {
                document.getElementById('mobileMenuPanel').classList.remove('open');
                document.getElementById('mobileOverlay').classList.remove('open');
            }

            function toggleMobileMenu() {
                if (document.getElementById('mobileMenuPanel').classList.contains('open')) {
                    closeMobileMenu();
                } else {
                    openMobileMenu();
                }
            }

            // ===== אירועים =====
            document.getElementById('mobileMenuToggle').addEventListener('click', toggleMobileMenu);
            document.getElementById('mobileMenuClose').addEventListener('click', closeMobileMenu);
            document.getElementById('mobileOverlay').addEventListener('click', closeMobileMenu);

            document.getElementById('mobileUpdateBtn').addEventListener('click', window.updateNetMobile);
            document.getElementById('mobilePdfBtn').addEventListener('click', function() {
                closeMobileMenu();
                const dims = getMobileDimensions();
                document.getElementById('inputL').value = dims.L;
                document.getElementById('inputW').value = dims.W;
                document.getElementById('inputH').value = dims.H;
                document.getElementById('hideLabels').checked = getMobileHideLabels();
                document.getElementById('noteInput').value = getMobileNote();
                buildNet(dims.L, dims.W, dims.H);
                setTimeout(window.downloadPDF, 400);
            });

            // סנכרון שדות
            document.getElementById('inputL').addEventListener('change', syncFieldsToMobile);
            document.getElementById('inputW').addEventListener('change', syncFieldsToMobile);
            document.getElementById('inputH').addEventListener('change', syncFieldsToMobile);
            document.getElementById('hideLabels').addEventListener('change', function() {
                document.getElementById('mobileHideLabels').checked = this.checked;
                const dims = getDimensions();
                buildNet(dims.L, dims.W, dims.H);
            });
            document.getElementById('noteInput').addEventListener('input', function() {
                document.getElementById('mobileNoteInput').value = this.value;
            });

            document.getElementById('mobileHideLabels').addEventListener('change', function() {
                document.getElementById('hideLabels').checked = this.checked;
                const dims = getMobileDimensions();
                buildNet(dims.L, dims.W, dims.H);
            });
            document.getElementById('mobileNoteInput').addEventListener('input', function() {
                document.getElementById('noteInput').value = this.value;
            });

            // Enter
            document.querySelectorAll('#mobileInputL, #mobileInputW, #mobileInputH, #mobileNoteInput').forEach(input => {
                input.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter') {
                        window.updateNetMobile();
                    }
                });
            });

            document.querySelectorAll('.controls input').forEach(input => {
                input.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter') {
                        updateNet();
                    }
                });
            });

            document.getElementById('noteInput').addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    updateNet();
                }
            });

            // התאמה לשינוי גודל חלון
            let resizeTimeout;
            window.addEventListener('resize', function() {
                clearTimeout(resizeTimeout);
                resizeTimeout = setTimeout(() => {
                    const dims = getDimensions();
                    buildNet(dims.L, dims.W, dims.H);
                }, 400);
            });

            // ===== אתחול =====
            document.getElementById('inputL').value = L;
            document.getElementById('inputW').value = W;
            document.getElementById('inputH').value = H;
            document.getElementById('mobileInputL').value = L;
            document.getElementById('mobileInputW').value = W;
            document.getElementById('mobileInputH').value = H;

            buildNet(L, W, H);

            console.log('✅ מוכן!');
        })();
    </script>

</body>
</html>
